name: CI/CD — Build, Push & Deploy en EKS

on:
  push:
    branches:
      - main

jobs:

  # ─── JOB 1: Build y Push Backend ───────────────────────────────────
  build-backend:
    name: Build & Push — Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen Backend
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/tienda-perritos-backend:latest
          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI
          echo "BACKEND_IMAGE=$IMAGE_URI" >> $GITHUB_ENV

  # ─── JOB 2: Build y Push Frontend ──────────────────────────────────
  build-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen Frontend
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/tienda-perritos-frontend:latest
          docker build -t $IMAGE_URI ./frontend
          docker push $IMAGE_URI

  # ─── JOB 3: Deploy en EKS ──────────────────────────────────────────
  deploy:
    name: Deploy en EKS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Crear namespace si no existe
        run: |
          kubectl get namespace ${{ secrets.EKS_NAMESPACE }} || \
          kubectl create namespace ${{ secrets.EKS_NAMESPACE }}

      - name: Deploy en EKS
        run: |
          kubectl apply -f k8s/ -n ${{ secrets.EKS_NAMESPACE }}
          kubectl rollout status deployment/backend -n ${{ secrets.EKS_NAMESPACE }}
          kubectl rollout status deployment/frontend -n ${{ secrets.EKS_NAMESPACE }}
